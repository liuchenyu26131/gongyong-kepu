<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>功用科普</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f6f8;color:#333;font-size:15px;line-height:1.6}
.header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #eee;padding:12px 16px;display:flex;align-items:center;gap:10px}
.header h1{font-size:18px;font-weight:600;color:#2c3e50;flex:1}
.header .back-btn{display:none;font-size:14px;color:#e67e22;cursor:pointer;padding:4px 0;white-space:nowrap}
.header .back-btn.show{display:block}
.header .badge{font-size:11px;color:#999;font-weight:400}
.search-wrap{padding:10px 16px;background:#fff;border-bottom:1px solid #eee}
.search-wrap input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;outline:none;background:#f5f6f8}
.search-wrap input:focus{border-color:#e67e22;background:#fff}
#list-view{background:#fff;min-height:calc(100vh - 52px)}
.cat-header{display:flex;align-items:center;padding:14px 16px;font-size:14px;font-weight:600;color:#2c3e50;cursor:pointer;border-bottom:1px solid #f0f0f0;background:#fff}
.cat-header .arrow{font-size:10px;margin-right:8px;transition:transform .2s;color:#bbb}
.cat-header .arrow.open{transform:rotate(90deg)}
.cat-header .count{margin-left:auto;font-size:11px;color:#bbb;font-weight:400}
.cat-body{display:none}
.cat-body.open{display:block}
.prod{display:flex;align-items:center;padding:13px 16px 13px 36px;font-size:14px;border-bottom:1px solid #f5f5f5;cursor:pointer;color:#555}
.prod:active{background:#f8f4ef}
.prod::before{content:'';position:absolute;left:16px;width:6px;height:6px;border-radius:50%;background:#ddd;margin-top:-3px}
#content-view{display:none;padding:16px;padding-bottom:40px;max-width:720px;margin:0 auto}
#content-view.show{display:block}
.loading{text-align:center;padding:60px 20px;color:#999;font-size:14px}
.actions{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:4px;padding:9px 16px;border:none;border-radius:8px;font-size:13px;cursor:pointer;background:#2c3e50;color:#fff;font-weight:500}
.btn:active{opacity:.8}
.btn.ghost{background:#f0f0f0;color:#333}
.toast{position:fixed;bottom:30%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;display:none}

/* 内嵌内容卡片样式 */
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-icon{font-size:22px;margin-bottom:8px}
.card h2{font-size:17px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #eee}
.card p{font-size:14px;line-height:1.8;margin:8px 0}
.card ol{padding-left:18px;font-size:14px;line-height:2}
.path-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.path-item{display:flex;align-items:center;gap:10px;background:#fafafa;border-radius:8px;padding:10px;font-size:13px}
.path-num{width:24px;height:24px;border-radius:50%;background:#e67e22;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.compact-table{border:1px solid #eee;border-radius:8px;overflow:hidden;font-size:13px}
.ct-row{display:flex;border-bottom:1px solid #eee;padding:8px 12px}
.ct-row:last-child{border-bottom:none}
.ct-label{width:100px;font-weight:600;color:#666;flex-shrink:0}
.ct-value{flex:1;color:#555;line-height:1.6}
@media(prefers-color-scheme:dark){
body{background:#1a1a1a;color:#ddd}
.header,.search-wrap,#list-view,.cat-header,.prod,.card{background:#222;border-color:#333}
.search-wrap input{background:#2a2a2a;color:#ddd;border-color:#444}
.search-wrap input:focus{border-color:#e67e22;background:#222}
.prod:active{background:#2a2a25}
.cat-header .count,.cat-header .arrow{color:#666}
.path-item{background:#2a2a2a}
.compact-table{border-color:#333}
.ct-row{border-color:#333}
.ct-label{color:#888}
.ct-value{color:#ccc}
.btn{background:#3a3a3a;color:#ddd}
}
</style>
</head>

var CAT_NAMES = {'01_正分子维生素类':'正分子维生素类','02_矿物质与电解质':'矿物质·电解质','03_氨基酸肽与肌肉营养':'氨基酸·肽·肌肉','04_抗衰与线粒体代谢':'抗衰·线粒体','05_油脂与肠道调理':'油脂·肠道','06_神经睡眠与情绪':'神经·睡眠','07_综合定制与功能辅料':'综合·功能辅料','99_单品原料':'单品原料'};
var CAT_ORDER = ['01_正分子维生素类','02_矿物质与电解质','03_氨基酸肽与肌肉营养','04_抗衰与线粒体代谢','05_油脂与肠道调理','06_神经睡眠与情绪','07_综合定制与功能辅料','99_单品原料'];

// ====== 内嵌内容：已拷贝 AI 分析的完整页面 ======
var INLINE_CONTENT = {};

// ====== 从 GitHub raw 加载 MD 的路径映射 ======
var GH_BASE = 'https://raw.githubusercontent.com/liuchenyu26131/gongyong-kepu/main/';
var FILE_MAP = {
  "068c":"07_综合定制与功能辅料/068c_基础全营养素双剂型-功用科普.md"
};

// ====== 初始化 ======
function init(){
  renderList();
  var p = new URLSearchParams(window.location.search).get('p');
  if(p){var d=INDEX_DATA.find(function(x){return x.id===p});if(d)loadProduct(d.id);}
  document.getElementById('countBadge').textContent=INDEX_DATA.length+'个';
}
init();

function renderList(q){
  q=(q||'').toLowerCase();
  var g={};
  INDEX_DATA.forEach(function(d){
    var go=d.cat||'未分类';if(!g[go])g[go]=[];
    if(!q||d.title.toLowerCase().indexOf(q)!==-1||(d.tags&&d.tags.some(function(t){return t.toLowerCase().indexOf(q)!==-1})))g[go].push(d);
  });
  var html='';
  CAT_ORDER.forEach(function(k){
    if(!g[k]||!g[k].length)return;
    html+='<div class="cat"><div class="cat-header" onclick="toggleCat(this)"><span class="arrow">▶</span> '+(CAT_NAMES[k]||k)+' <span class="count">'+g[k].length+'</span></div><div class="cat-body">';
    g[k].forEach(function(d){html+='<div class="prod" onclick="loadProduct(\''+d.id+'\')">'+d.title+'</div>';});
    html+='</div></div>';
  });
  if(!html)html='<div style="padding:40px;text-align:center;color:#999">未找到匹配产品</div>';
  document.getElementById('list-view').innerHTML=html;
  var first=document.querySelector('.cat-body');
  if(first){first.classList.add('open');first.previousElementSibling.querySelector('.arrow').classList.add('open');}
}

function toggleCat(h){
  var b=h.nextElementSibling,a=h.querySelector('.arrow');
  b.classList.toggle('open');a.classList.toggle('open');
}

function onSearch(v){
  renderList(v);
  if(v){document.querySelectorAll('.cat-body').forEach(function(b){b.classList.add('open')});document.querySelectorAll('.cat-header .arrow').forEach(function(a){a.classList.add('open')});}
}

// ====== 加载产品：优先内嵌内容 → GitHub raw MD → n.cn 跳转 ======
function loadProduct(id){
  var d=INDEX_DATA.find(function(x){return x.id===id});
  if(!d)return;
  document.getElementById('list-view').style.display='none';
  document.getElementById('searchWrap').style.display='none';
  var cv=document.getElementById('content-view');
  cv.style.display='block';cv.classList.add('show');
  document.getElementById('backBtn').classList.add('show');
  var u=new URL(window.location);u.searchParams.set('p',id);window.history.replaceState({},'',u);

  // 1. 内嵌内容
  if(INLINE_CONTENT[id]){cv.innerHTML=INLINE_CONTENT[id];return;}

  // 2. GitHub raw MD
  cv.innerHTML='<div class="loading">加载中...</div>';
  var mp=FILE_MAP[id];
  if(mp){
    fetch(GH_BASE+mp).then(function(r){
      if(!r.ok)throw Error(''+r.status);
      return r.text();
    }).then(function(md){
      cv.innerHTML='<div class="actions"><button class="btn" onclick="copyShare()">📋 复制链接</button></div>'+simpleMD(md);
    }).catch(function(){
      fallback(d);
    });
  }else{fallback(d);}
}

function fallback(d){
  var h='<h1>'+d.title+'</h1><div class="actions"><button class="btn" onclick="copyShare()">📋 复制链接</button>';
  if(d.url){
    h+='<a href="'+d.url+'" target="_blank" class="btn" style="background:#e67e22">🔗 查看原文 (永久链接)</a>';
    h+='</div><div style="padding:24px;text-align:center;color:#999;font-size:14px">点击按钮查看完整分析报告</div>';
  }else{
    h+='</div><div style="padding:40px;text-align:center;color:#ccc;font-size:13px">暂无内容</div>';
  }
  document.getElementById('content-view').innerHTML=h;
}

// ====== 简易 MD 渲染 ======
function simpleMD(md){
  var lines=md.split('\n'),out=[],inTable=false;
  lines.forEach(function(l){
    if(/^##\s/.test(l)){out.push('<h2>'+l.replace(/^##\s/,'')+'</h2>');return;}
    if(/^###\s/.test(l)){out.push('<h3>'+l.replace(/^###\s/,'')+'</h3>');return;}
    if(/^#\s/.test(l)){out.push('<h1>'+l.replace(/^#\s/,'')+'</h1>');return;}
    if(/^\|.+\|$/.test(l)){
      if(/^\|[\s\-:]+\|$/.test(l))return;
      var cells=l.replace(/^\||\|$/g,'').split('|').map(function(c){return c.trim()});
      out.push('<div class="tbl-r">'+cells.map(function(c){return'<span class="tbl-c">'+c+'</span>'}).join('')+'</div>');
      return;
    }
    if(/^-{3,}$/.test(l)){out.push('<hr>');return;}
    if(/^>\s/.test(l)){out.push('<blockquote>'+l.replace(/^>\s/,'')+'</blockquote>');return;}
    if(/^- .+/.test(l)){out.push('<li>'+l.replace(/^- /,'')+'</li>');return;}
    if(l.trim()===''){out.push('</p><p>');return;}
    out.push(l.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*(.+?)\*/g,'<i>$1</i>'));
  });
  return '<p>'+out.join('')+'</p>';
}

function showList(){
  document.getElementById('list-view').style.display='';
  document.getElementById('searchWrap').style.display='';
  document.getElementById('content-view').style.display='none';document.getElementById('content-view').classList.remove('show');
  document.getElementById('backBtn').classList.remove('show');
  var u=new URL(window.location);u.searchParams.delete('p');window.history.replaceState({},'',u);
}

function copyShare(){
  var url=window.location.href;
  if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){showToast('✅ 已复制');});}
  else{showToast('⚠️ 手动复制地址栏');}
}

function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(function(){t.style.display='none'},2000);}

function toggleDark(){
  var d=document.body.style;
  if(!d.backgroundColor||d.backgroundColor==='rgb(245, 246, 248)'){d.backgroundColor='#1a1a1a';d.color='#ddd';}
  else{d.backgroundColor='';d.color='';}
}
</script>
